<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>{% block title %}Gate{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; min-height: 100vh;
           margin: 0; align-items: center; justify-content: center; background: #f4f4f5; }
    main { text-align: center; padding: 2rem; }
    h1 { font-size: 1.4rem; }
    button.open { font-size: 1.5rem; padding: 1rem 2.5rem; border: 0; border-radius: 12px;
                  background: #16a34a; color: white; cursor: pointer; }
    button.open:active { background: #15803d; }
    .muted { color: #71717a; }
  </style>
</head>
<body>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
