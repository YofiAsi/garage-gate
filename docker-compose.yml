services:
  garage-gate:
    build: .
    restart: unless-stopped
    env_file: .env
    # Home Assistant's own compose file uses network_mode: host (needed for
    # HA's LAN discovery), and is only reachable on the Tailscale interface,
    # not the LAN IP (confirmed: LAN connections refused, Tailscale
    # connections succeed). Matching network_mode: host here lets this app
    # reach HA via plain "localhost" — no Tailscale client, no hardcoded
    # Tailscale IP to keep in sync. Requires Dokploy to route to this
    # service by host port (e.g. 127.0.0.1:8000) rather than by container
    # DNS name/bridge network, since host networking has no bridge network
    # of its own. No `ports`/`expose` needed either — meaningless under
    # host networking, since there's no port translation to do.
    network_mode: host
    volumes:
      - gate-data:/data

volumes:
  gate-data:
