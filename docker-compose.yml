services:
  garage-gate:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - gate-data:/data
    expose:
      - "8000"
    extra_hosts:
      # Home Assistant runs with network_mode: host and listens on 0.0.0.0:8123,
      # so it accepts connections on every host address. What blocks containers
      # is ufw: its default INPUT policy denies traffic arriving from Docker
      # bridges, which shows up as a silent timeout rather than a refusal.
      #
      # The host firewall therefore carries a companion rule:
      #   ufw allow from 10.77.0.0/24 to any port 8123 proto tcp
      # That rule matches on SOURCE address, which is why the subnet below is
      # pinned rather than left to Docker's auto-assignment from 172.16.0.0/12.
      # Change one without the other and the gate silently stops opening.
      - "host.docker.internal:host-gateway"

networks:
  default:
    ipam:
      config:
        # Pinned so the ufw rule above keeps matching across redeploys. Docker
        # would otherwise hand out an arbitrary /16 from its default pool, and
        # the bridge name (br-<netid>) changes too. Verified free of every
        # other Docker network on this host, the LAN (192.168.1.0/24), and
        # Tailscale (100.64.0.0/10).
        - subnet: 10.77.0.0/24

volumes:
  gate-data:
