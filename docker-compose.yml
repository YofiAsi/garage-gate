services:
  garage-gate:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - gate-data:/data
    expose:
      - "8000"
    extra_hosts:
      # "yofiserver" is a Tailscale MagicDNS name, not resolvable from
      # inside a plain container. Home Assistant is bound to the Tailscale
      # interface (confirmed: unreachable on the LAN IP, reachable on the
      # Tailscale IP), so this must be the Tailscale IP, not the LAN IP.
      # Since Dokploy runs on the same HomeLab box as Home Assistant, the
      # container reaches it through the host's own tailscale0 route — no
      # Tailscale client needed inside the container itself; this is just a
      # hardcoded private IP. Update this IP if it changes (check with
      # `tailscale status` on the HomeLab server). If HA_WEBHOOK_URL is
      # switched to use host.docker.internal instead (see below), this
      # entry is no longer needed.
      - "yofiserver:100.69.227.53"
      # Experimental Tailscale-free alternative: HA (network_mode: host, no
      # server_host restriction) should also be listening on the Docker
      # bridge gateway, reachable here without any hardcoded IP. Try setting
      # HA_WEBHOOK_URL to http://host.docker.internal:8123/api/webhook/<id>
      # — if the host firewall only blocks the LAN interface specifically,
      # this works and needs no Tailscale IP at all. If it still gets
      # "connection refused", the firewall is blocking more broadly than
      # just the LAN interface; fall back to the yofiserver mapping above.
      - "host.docker.internal:host-gateway"

volumes:
  gate-data:
